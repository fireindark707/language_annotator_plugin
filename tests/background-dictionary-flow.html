<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>background-dictionary-flow</title>
</head>
<body>
  <pre id="test-output"></pre>
  <script>
    window.importScripts = function () {};
    window.chrome = {
      runtime: {
        lastError: null,
        onInstalled: { addListener() {} },
        onStartup: { addListener() {} },
        onMessage: { addListener() {} },
      },
      contextMenus: {
        create() {},
        onClicked: { addListener() {} },
      },
      tabs: { sendMessage() {} },
    };
    window.WordStorage = { init() {} };
    window.simplemma = {
      SUPPORTED_LANGUAGES: ["en", "id", "tl"],
      FetchDictionaryFactory: function () {},
      DefaultStrategy: function () {},
      Lemmatizer: function () { this.lemmatizeAsync = async (text) => text; },
    };
  </script>
  <script src="../lib/dictionary-utils.js"></script>
  <script src="../background.js"></script>
  <script src="./lib/test-harness.js"></script>
  <script>
    const { assert, assertEqual, runTests } = window.TestHarness;

    runTests([
      {
        name: "buildDictionaryLookup routes to the expected primary source name",
        run() {
          const originalLookupKateglo = DictionaryUtils.lookupKateglo;
          const originalLookupFree = DictionaryUtils.lookupFreeDictionaryByLang;
          const originalLookupEnglish = DictionaryUtils.lookupEnglishFreeDictionary;
          const originalLookupJotoba = DictionaryUtils.lookupJotobaJapaneseDictionary;
          DictionaryUtils.lookupKateglo = () => Promise.resolve({ found: false, source: "kateglo", entries: [] });
          DictionaryUtils.lookupFreeDictionaryByLang = () => Promise.resolve({ found: false, source: "dictionaryapi", entries: [] });
          DictionaryUtils.lookupEnglishFreeDictionary = () => Promise.resolve({ found: false, source: "dictionaryapi", entries: [] });
          DictionaryUtils.lookupJotobaJapaneseDictionary = () => Promise.resolve({ found: false, source: "jotoba", entries: [] });

          assertEqual(DictionaryUtils.buildDictionaryLookup("mobil", "id").sourceName, "kateglo");
          assertEqual(DictionaryUtils.buildDictionaryLookup("walk", "en").sourceName, "dictionaryapi");
          assertEqual(DictionaryUtils.buildDictionaryLookup("食べる", "ja").sourceName, "jotoba");
          assertEqual(DictionaryUtils.buildDictionaryLookup("andar", "es").sourceName, "dictionaryapi");

          DictionaryUtils.lookupKateglo = originalLookupKateglo;
          DictionaryUtils.lookupFreeDictionaryByLang = originalLookupFree;
          DictionaryUtils.lookupEnglishFreeDictionary = originalLookupEnglish;
          DictionaryUtils.lookupJotobaJapaneseDictionary = originalLookupJotoba;
        },
      },
      {
        name: "lookupDictionaryWithLemmaFallback returns both surface and lemma sections when both exist",
        async run() {
          const originalBuilder = DictionaryUtils.buildDictionaryLookup;
          DictionaryUtils.buildDictionaryLookup = (text) => ({
            sourceName: "dictionaryapi",
            lookupPromise: Promise.resolve(
              text === "running"
                ? { found: true, source: "dictionaryapi", entries: [{ definition: "current form" }] }
                : { found: true, source: "dictionaryapi", entries: [{ definition: "lemma form" }] }
            ),
          });
          getLemmaForQuery = () => Promise.resolve({ found: true, lemma: "run", lang: "en" });

          const result = await lookupDictionaryWithLemmaFallback("running", "en");
          assertEqual(result.found, true);
          assertEqual(result.usedLemma, false);
          assertEqual(result.sections.length, 2);
          assertEqual(result.sections[0].mode, "surface");
          assertEqual(result.sections[1].mode, "lemma");
          assertEqual(result.sections[1].query, "run");
          DictionaryUtils.buildDictionaryLookup = originalBuilder;
        },
      },
      {
        name: "lookupDictionaryWithLemmaFallback promotes lemma result when surface lookup misses",
        async run() {
          const originalBuilder = DictionaryUtils.buildDictionaryLookup;
          DictionaryUtils.buildDictionaryLookup = (text) => ({
            sourceName: "dictionaryapi",
            lookupPromise: Promise.resolve(
              text === "running"
                ? { found: false, source: "dictionaryapi", entries: [] }
                : { found: true, source: "dictionaryapi", entries: [{ definition: "lemma form" }] }
            ),
          });
          getLemmaForQuery = () => Promise.resolve({ found: true, lemma: "run", lang: "en" });

          const result = await lookupDictionaryWithLemmaFallback("running", "en");
          assertEqual(result.found, true);
          assertEqual(result.usedLemma, true);
          assertEqual(result.entries[0].definition, "lemma form");
          assertEqual(result.sections[0].found, false);
          assertEqual(result.sections[1].found, true);
          DictionaryUtils.buildDictionaryLookup = originalBuilder;
        },
      },
      {
        name: "lookupDictionaryWithLemmaFallback keeps only surface section when lemma is empty or unchanged",
        async run() {
          const originalBuilder = DictionaryUtils.buildDictionaryLookup;
          DictionaryUtils.buildDictionaryLookup = () => ({
            sourceName: "dictionaryapi",
            lookupPromise: Promise.resolve({ found: true, source: "dictionaryapi", entries: [{ definition: "surface only" }] }),
          });
          getLemmaForQuery = () => Promise.resolve({ found: false, lemma: "", lang: "en" });

          const result = await lookupDictionaryWithLemmaFallback("run", "en");
          assertEqual(result.sections.length, 1);
          assertEqual(result.sections[0].mode, "surface");
          assertEqual(result.usedLemma, false);
          DictionaryUtils.buildDictionaryLookup = originalBuilder;
        },
      },
    ]);
  </script>
</body>
</html>
