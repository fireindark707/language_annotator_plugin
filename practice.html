<!DOCTYPE html>
<html lang="zh-Hant">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>抽卡練習</title>
	<style>
		:root {
			--bg: #f5efe6;
			--bg-wash: #eee4d6;
			--card: #fffaf3;
			--card-soft: #f7efe3;
			--text: #34251f;
			--muted: #766258;
			--primary: #8f5143;
			--primary-strong: #784136;
			--primary-soft: #f1e6da;
			--ok: #5f7d4a;
			--bad: #9a5c50;
			--border: #d8c6b8;
			--chip-bg: #f8f1e8;
			--focus: #a26650;
			--option-hover: #f8f0e6;
		}
			* { box-sizing: border-box; }
			body {
				margin: 0;
				padding: clamp(12px, 2vw, 18px);
				background:
					radial-gradient(circle at top left, rgba(255, 250, 243, 0.92) 0, rgba(255, 250, 243, 0) 24%),
					linear-gradient(180deg, var(--bg) 0%, var(--bg-wash) 100%);
				color: var(--text);
				font-family: "Noto Sans TC", "Hiragino Sans", "Yu Gothic UI", sans-serif;
			}
		.wrap {
			max-width: 880px;
			margin: 0 auto;
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 20px 17px 22px 18px;
			padding: 18px;
			box-shadow: 0 12px 26px rgba(79, 57, 46, 0.08), inset 0 1px 0 rgba(255,255,255,0.72);
			position: relative;
			overflow: hidden;
		}
		.wrap::before {
			content: "";
			position: absolute;
			top: 0;
			left: 0;
			right: 0;
			height: 5px;
			background: linear-gradient(90deg, #b2866d 0%, #8f5143 58%, #c19b83 100%);
		}
		.head {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 10px;
		}
		.head-actions {
			display: flex;
			align-items: center;
			gap: 10px;
		}
		.help-btn {
			width: 28px;
			min-width: 28px;
			height: 28px;
			min-height: 28px;
			padding: 0;
			border-radius: 999px;
			border: 1px solid #dccabd;
			background: #fffaf5;
			color: #7d5547;
			font-size: 13px;
			font-weight: 800;
			line-height: 1;
		}
		.title {
			margin: 0;
			font-size: 22px;
			font-weight: 800;
			letter-spacing: 0.2px;
			font-family: "Noto Serif TC", "Hiragino Mincho ProN", "Yu Mincho", serif;
		}
		.sub {
			margin: 6px 0 0;
			color: var(--muted);
			font-size: 13px;
		}
		.stats {
			margin-top: 12px;
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 10px;
		}
		@media (max-width: 920px) {
			.stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
		}
		.chip {
			font-size: 19px;
			font-weight: 900;
			border: 1px solid var(--border);
			border-radius: 16px 14px 18px 13px;
			padding: 12px 10px;
			color: #4a352d;
			background: #fffdf9;
			text-align: center;
			line-height: 1.2;
			min-height: 66px;
			display: flex;
			align-items: center;
			justify-content: center;
			letter-spacing: 0.2px;
			box-shadow: 0 5px 12px rgba(79, 57, 46, 0.06);
		}
		#progressChip {
			background: linear-gradient(180deg, #fffdf9 0%, #f6eee4 100%);
		}
		#scoreChip {
			background: linear-gradient(180deg, #fffdf9 0%, #f4ecdf 100%);
		}
		#challengeChip {
			font-size: 15px;
			font-weight: 800;
			background: linear-gradient(180deg, #6f584d 0%, #5d483f 100%);
			color: #f7efe6;
			border-color: #8a7063;
		}
		#streakChip {
			font-size: 22px;
			font-weight: 900;
			color: #fffaf3;
			background: linear-gradient(180deg, #b4745f 0%, #8f5143 100%);
			border-color: #9b5c49;
			text-shadow: 0 1px 2px rgba(90, 57, 40, 0.24);
			box-shadow: 0 8px 16px rgba(133, 89, 64, 0.22);
			transform-origin: center;
		}
		#streakChip.streak-pop {
			animation: streakPop 480ms cubic-bezier(.2,.8,.2,1);
		}
		#streakChip.streak-fire {
			animation: streakFire 1.2s ease-in-out infinite alternate;
		}
		#streakChip.streak-drop {
			animation: streakDrop 340ms cubic-bezier(.2,.8,.2,1);
		}
		@keyframes streakPop {
			0% { transform: scale(1); }
			35% { transform: scale(1.12); }
			100% { transform: scale(1); }
		}
		@keyframes streakFire {
			0% { box-shadow: 0 8px 16px rgba(103, 16, 34, 0.28); }
			100% { box-shadow: 0 10px 24px rgba(185, 25, 53, 0.5); }
		}
		@keyframes streakDrop {
			0% { transform: scale(1); }
			45% { transform: scale(0.92); }
			100% { transform: scale(1); }
		}
		.progress-wrap {
			margin-top: 10px;
		}
		.progress-track {
			height: 8px;
			border-radius: 999px;
			background: #e5d7ca;
			overflow: hidden;
		}
		.progress-fill {
			height: 100%;
			width: 0%;
			border-radius: 999px;
			background: linear-gradient(90deg, #c19b83 0%, #8f5143 100%);
			transition: width 240ms ease;
		}
		.card {
			margin-top: 14px;
			border: 1px solid var(--border);
			border-radius: 18px 15px 20px 16px;
			padding: 18px;
			background: #fffdf9;
			transition: transform 260ms cubic-bezier(.2,.8,.2,1), box-shadow 260ms cubic-bezier(.2,.8,.2,1), border-color 260ms ease;
		}
		.card.is-entering {
			animation: cardEnter 360ms cubic-bezier(.2,.8,.2,1);
		}
		.card.is-correct {
			border-color: #cadcb8;
			box-shadow: 0 0 0 3px rgba(95, 125, 74, 0.12);
			animation: popYes 520ms cubic-bezier(.2,.8,.2,1);
		}
		.card.is-wrong {
			border-color: #e2cfc5;
			box-shadow: 0 0 0 3px rgba(154, 92, 80, 0.12);
			animation: shakeNo 440ms cubic-bezier(.2,.8,.2,1);
		}
		@keyframes popYes {
			0% { transform: scale(1); }
			30% { transform: scale(1.035); }
			100% { transform: scale(1); }
		}
		@keyframes shakeNo {
			0% { transform: translateX(0); }
			25% { transform: translateX(-6px); }
			50% { transform: translateX(6px); }
			75% { transform: translateX(-4px); }
			100% { transform: translateX(0); }
		}
		@keyframes cardEnter {
			0% { opacity: 0; transform: translateY(10px) scale(0.98); }
			70% { opacity: 1; transform: translateY(-2px) scale(1.01); }
			100% { opacity: 1; transform: translateY(0) scale(1); }
		}
		.prompt {
			font-size: 13px;
			color: var(--muted);
		}
		.stimulus {
			margin-top: 8px;
			font-size: 24px;
			font-weight: 800;
			line-height: 1.35;
			padding: 10px 12px;
			border-radius: 14px 12px 16px 11px;
			background: #faf4ec;
			border: 1px solid #e1d3c7;
		}
		.options {
			margin-top: 14px;
			display: grid;
			gap: 8px;
			grid-template-columns: repeat(2, minmax(0, 1fr));
		}
		@media (max-width: 740px) {
			.options { grid-template-columns: 1fr; }
		}
		.option {
			border: 1px solid var(--border);
			background: #fffdf9;
			color: var(--text);
			border-radius: 14px 12px 16px 11px;
			padding: 12px 13px;
			font-size: 14px;
			text-align: left;
			cursor: pointer;
			transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease, background 120ms ease;
		}
		.option:hover {
			border-color: #b06a78;
			background: var(--option-hover);
			transform: translateY(-1px);
			box-shadow: 0 4px 10px rgba(62, 32, 39, 0.11);
		}
		.option:focus-visible {
			outline: 2px solid var(--focus);
			outline-offset: 2px;
		}
		.option-label {
			display: inline-block;
			min-width: 22px;
			padding-right: 4px;
			font-weight: 900;
			color: #8f5143;
		}
		.option.is-correct { border-color: #b9d0a4; background: #f2f8eb; color: var(--ok); }
		.option.is-wrong { border-color: #dcc4bb; background: #fbf1ee; color: var(--bad); }
		.feedback {
			margin-top: 10px;
			font-size: 13px;
			min-height: 20px;
		}
			.feedback.ok { color: var(--ok); }
			.feedback.bad { color: var(--bad); }
			.actions {
				margin-top: 14px;
				display: flex;
				gap: 8px;
				flex-wrap: wrap;
			}
			.actions button {
				flex: 1 1 160px;
			}
		button {
			border: 1px solid #c9b09f;
			border-radius: 14px 12px 16px 11px;
			padding: 10px 14px;
			font-size: 13px;
			font-weight: 700;
			cursor: pointer;
			transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
		}
		button:focus-visible {
			outline: 2px solid var(--focus);
			outline-offset: 2px;
		}
		button:disabled {
			opacity: 0.6;
			cursor: not-allowed;
			transform: none !important;
			box-shadow: none !important;
		}
		.btn-primary { background: var(--primary); color: #fffaf3; border-color: #9d6652; }
		.btn-primary:hover { background: var(--primary-strong); transform: translateY(-1px); box-shadow: 0 8px 16px rgba(123, 89, 70, 0.2); }
		.btn-soft { background: var(--primary-soft); color: #76584e; border: 1px solid #dbc8b7; }
		.btn-soft:hover { transform: translateY(-1px); box-shadow: 0 5px 12px rgba(88, 63, 50, 0.12); }
		.summary {
			margin-top: 14px;
			border: 1px solid var(--border);
			border-radius: 16px 14px 18px 13px;
			background: #fffdf9;
			padding: 14px;
			display: none;
			position: relative;
			overflow: hidden;
		}
		.summary h3 {
			margin: 0 0 8px;
			font-size: 18px;
			font-weight: 800;
		}
		.summary-badge {
			display: inline-block;
			padding: 4px 10px;
			border-radius: 999px;
			background: #f1e7da;
			color: #7d5a4d;
			font-size: 12px;
			font-weight: 700;
		}
		.summary-score {
			margin-top: 10px;
			font-size: 34px;
			font-weight: 900;
			line-height: 1;
			color: #8f5143;
		}
			.summary-comment {
				margin-top: 8px;
				font-size: 14px;
				font-weight: 700;
			color: #6e584f;
			}
			.summary-metrics {
				margin-top: 10px;
				display: grid;
				grid-template-columns: repeat(3, minmax(0, 1fr));
				gap: 8px;
			}
		.summary-metric {
			border: 1px solid #e1d2c4;
			border-radius: 14px 12px 16px 11px;
			background: #fffaf5;
			padding: 8px 10px;
		}
		.summary-metric-label {
			font-size: 11px;
			color: #847067;
		}
		.summary-metric-value {
			margin-top: 3px;
			font-size: 16px;
			font-weight: 800;
			color: #58433a;
		}
		.summary-reviewed {
			margin-top: 14px;
			padding-top: 14px;
			border-top: 1px dashed #dccdc0;
		}
		.summary-reviewed[hidden] {
			display: none !important;
		}
		.summary-reviewed-head {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 10px;
			flex-wrap: wrap;
		}
		.summary-reviewed-title {
			margin: 0;
			font-size: 15px;
			font-weight: 800;
			color: #4f3a33;
		}
		.summary-reviewed-desc {
			margin-top: 4px;
			font-size: 12px;
			line-height: 1.5;
			color: #7b665b;
			max-width: 560px;
		}
		.reviewed-list {
			margin-top: 12px;
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 8px;
		}
		.reviewed-item {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 10px;
			padding: 10px 12px;
			border: 1px solid #e1d2c4;
			border-radius: 14px 12px 16px 11px;
			background: #fffaf5;
			transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
		}
		.reviewed-item.is-selected {
			border-color: #b9d0a4;
			background: #f2f8eb;
			box-shadow: 0 0 0 2px rgba(95, 125, 74, 0.1);
			transform: translateY(-1px);
		}
		.reviewed-item-main {
			min-width: 0;
			flex: 1 1 auto;
		}
		.reviewed-item-word {
			font-size: 15px;
			font-weight: 800;
			color: #4a342d;
			word-break: break-word;
		}
		.reviewed-item-meaning {
			margin-top: 4px;
			font-size: 12px;
			line-height: 1.5;
			color: #7d665c;
			word-break: break-word;
		}
		.reviewed-toggle {
			flex: 0 0 auto;
			min-width: 104px;
			padding-inline: 12px;
		}
		.reviewed-toggle.is-selected {
			background: #5f7d4a;
			border-color: #6e8858;
			color: #fffaf3;
		}
		.summary-reviewed-actions {
			margin-top: 12px;
			display: flex;
			justify-content: flex-end;
			gap: 8px;
			flex-wrap: wrap;
		}
		#summaryCelebrate {
			position: absolute;
			inset: 0;
			pointer-events: none;
		}
		.summary-spark {
			position: absolute;
			width: 10px;
			height: 10px;
			border-radius: 50%;
			opacity: 0;
			animation: burst 760ms ease-out forwards;
		}
		#celebrate {
			position: absolute;
			inset: 0;
			pointer-events: none;
		}
		#answerFlash {
			position: fixed;
			top: 22vh;
			left: 50%;
			transform: translateX(-50%) translateY(-10px);
			z-index: 10000;
			opacity: 0;
			pointer-events: none;
			padding: 0 16px;
		}
		.answer-flash-card {
			min-width: min(90vw, 520px);
			max-width: min(92vw, 760px);
			border-radius: 18px 15px 20px 16px;
			border: 1px solid #d8c7b8;
			background: #fffaf4;
			color: #34251f;
			font-size: 17px;
			font-weight: 800;
			letter-spacing: 0.2px;
			text-align: center;
			box-shadow: 0 10px 20px rgba(88, 63, 50, 0.18);
			padding: 14px 18px;
		}
		#answerFlash.show {
			animation: answerFlashInOut 1600ms cubic-bezier(.2,.8,.2,1) forwards;
		}
		#answerFlash .status {
			font-size: 12px;
			font-weight: 800;
			color: #82695f;
			margin-bottom: 8px;
			text-transform: uppercase;
			letter-spacing: 0.8px;
		}
		#answerFlash .word {
			color: #8f5143;
			font-weight: 900;
			padding-right: 8px;
		}
		#answerFlash .meaning {
			color: #4f3a33;
			font-weight: 700;
		}
		@keyframes answerFlashInOut {
			0% { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.98); }
			15% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
			78% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
			100% { opacity: 0; transform: translateX(-50%) translateY(-6px) scale(0.99); }
		}
		#megaOverlay {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 9999;
			display: none;
			align-items: center;
			justify-content: center;
		}
		#megaOverlay.active {
			display: flex;
			animation: megaFlash 900ms ease-out forwards;
		}
		#megaOverlay::before {
			content: "";
			position: absolute;
			inset: 0;
			background:
				radial-gradient(circle at center, rgba(255, 233, 122, 0.42) 0%, rgba(255, 233, 122, 0.12) 30%, transparent 68%),
				linear-gradient(180deg, rgba(255, 84, 120, 0.15) 0%, rgba(255, 84, 120, 0.02) 100%);
		}
		#megaText {
			position: relative;
			font-size: clamp(42px, 8vw, 110px);
			font-weight: 900;
			letter-spacing: 1px;
			color: #fff6d0;
			text-shadow:
				0 0 20px rgba(255, 170, 60, 0.9),
				0 6px 18px rgba(0, 0, 0, 0.35);
			transform-origin: center;
			animation: megaTextBoom 900ms cubic-bezier(.2,.8,.2,1) forwards;
			text-align: center;
			padding: 0 16px;
		}
		body.mega-shake .wrap {
			animation: megaShake 420ms cubic-bezier(.2,.8,.2,1);
		}
		.spark {
			position: absolute;
			width: 10px;
			height: 10px;
			border-radius: 50%;
			opacity: 0;
			animation: burst 700ms ease-out forwards;
		}
		@keyframes burst {
			0% { transform: translate(0,0) scale(0.8); opacity: 0.9; }
			100% { transform: translate(var(--tx), var(--ty)) scale(0.2); opacity: 0; }
		}
		@keyframes megaFlash {
			0% { opacity: 0; }
			18% { opacity: 1; }
			100% { opacity: 0; }
		}
		@keyframes megaTextBoom {
			0% { opacity: 0; transform: scale(0.35) rotate(-4deg); }
			25% { opacity: 1; transform: scale(1.18) rotate(1.8deg); }
			45% { transform: scale(0.96) rotate(-0.8deg); }
			100% { opacity: 0; transform: scale(1.1) rotate(0deg); }
		}
		@keyframes megaShake {
			0% { transform: translateX(0); }
			15% { transform: translateX(-12px); }
			30% { transform: translateX(10px); }
			45% { transform: translateX(-8px); }
			60% { transform: translateX(8px); }
			75% { transform: translateX(-4px); }
			100% { transform: translateX(0); }
		}
			@media (prefers-reduced-motion: reduce) {
				* {
					animation: none !important;
					transition: none !important;
				}
			}
			@media (max-width: 720px) {
				.head {
					align-items: flex-start;
				}

				.summary-metrics {
					grid-template-columns: 1fr;
				}

				.reviewed-list {
					grid-template-columns: 1fr;
				}

				.summary-score {
					font-size: 30px;
				}

				#answerFlash {
					top: 16vh;
					padding: 0 12px;
				}
			}
		</style>
</head>
<body>
	<div class="wrap">
		<div id="celebrate"></div>
		<div class="head">
			<div>
				<h1 class="title" id="title">抽卡練習模式</h1>
				<p class="sub" id="subtitle">混合題型挑戰，每輪 10 題，每題 10 分。</p>
			</div>
			<div class="head-actions">
				<button class="help-btn" id="helpBtn" type="button" aria-label="Help">?</button>
				<button class="btn-soft" id="closeBtn">關閉分頁</button>
			</div>
		</div>

		<div class="stats">
			<span class="chip" id="progressChip">🎯 0/10 題</span>
			<span class="chip" id="scoreChip">🏆 0 分</span>
			<span class="chip" id="streakChip">🔥 x0 連擊</span>
			<span class="chip" id="challengeChip">⚔️ 連擊加時</span>
		</div>
		<div class="progress-wrap">
			<div class="progress-track">
				<div class="progress-fill" id="progressBar"></div>
			</div>
		</div>

		<div class="card" id="card">
			<div class="prompt" id="prompt"></div>
			<div class="stimulus" id="stimulus"></div>
			<div class="feedback" id="clozeTranslateText" style="display:none;"></div>
			<div class="options" id="options"></div>
			<div class="feedback" id="feedback"></div>
			<div class="actions" id="cardActions">
				<button class="btn-soft" id="clozeTranslateBtn" style="display:none;">顯示翻譯</button>
				<button class="btn-soft" id="markLearnedBtn" style="display:none;">標記已學會</button>
				<button class="btn-primary" id="nextBtn" style="display:none;">下一題</button>
			</div>
		</div>

		<div class="summary" id="summary">
			<h3 id="summaryTitle">本輪小結</h3>
			<div class="summary-badge" id="summaryBadge">完成挑戰</div>
			<div class="summary-score" id="summaryBigScore">0 / 100</div>
			<div class="summary-comment" id="summaryComment"></div>
			<div id="summaryText"></div>
			<div class="summary-metrics">
				<div class="summary-metric">
					<div class="summary-metric-label" id="summaryAccuracyLabel">正確率</div>
					<div class="summary-metric-value" id="summaryAccuracy">0%</div>
				</div>
				<div class="summary-metric">
